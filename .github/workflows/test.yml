name: Run salt tests
on:
  pull_request:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    uses: plus3it/actions-workflows/.github/workflows/test-salt-linux.yml@4fc4c282b54628725e2fdccb5f0d348544ce2eac
    strategy:
      matrix:
        os_version:
          - 8
          - 9
        salt_state:
          - k9s-k8smgt
        salt_pillar_root:
          - ./tests/pillar/test-linux-main
    with:
      salt-os-version: ${{ matrix.os_version }}
      salt-state: ${{ matrix.salt_state }}
      salt-pillar-root: ${{ matrix.salt_pillar_root }}

  windows:
    uses: plus3it/actions-workflows/.github/workflows/test-salt-windows.yml@4fc4c282b54628725e2fdccb5f0d348544ce2eac
    strategy:
      matrix:
        os_version:
          - windows-2019
          - windows-2022
          - windows-2025
        salt_state:
          - k9s-k8smgt
        salt_pillar_root:
          - ./tests/pillar/test-main
    with:
      salt-os-version: ${{ matrix.os_version }}
      salt-state: ${{ matrix.salt_state }}
      salt-pillar-root: ${{ matrix.salt_pillar_root }}
