---
k9s:
  # The interval in seconds for UI refreshes
  refreshRate: 2
  # Max number of log lines to display
  maxLogSize: 900
  # If true, prevents accidental deletions/modifications
  readOnly: false
  # Logs options
  logger:
    tail: 100
    showTime: true
  # UI Appearance
  currentContext: default
  currentCluster: default
  thresholds:
    cpu:
      critical: 90
      warn: 70
    memory:
      critical: 90
      warn: 70
